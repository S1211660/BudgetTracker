<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <h1>💰 Budget Tracker</h1>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Inloggen</button>
            <button class="tab" onclick="showTab('register')">Registreren</button>
        </div>

        <!-- Login -->
        <div id="login" class="form-box">
            <input type="email" id="login-email" placeholder="Email" />
            <input type="password" id="login-password" placeholder="Wachtwoord" />
            <button onclick="login()">Inloggen</button>
            <p id="login-error" class="error"></p>
        </div>

        <!-- Register -->
        <div id="register" class="form-box hidden">
            <input type="text" id="reg-username" placeholder="Gebruikersnaam" />
            <input type="email" id="reg-email" placeholder="Email" />
            <input type="password" id="reg-password" placeholder="Wachtwoord" />
            <button onclick="register()">Registreren</button>
            <p id="reg-error" class="error"></p>
            <p id="reg-success" class="success"></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>

</html>
